<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harness — Agent 设计器</title>
<style>
/* ═══════════════════════════════════════════
   暗色主题 / 布局
   ═══════════════════════════════════════════ */
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #c9d1d9;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --purple: #a371f7;
  --radius: 8px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}
header .subtitle {
  font-size: 12px;
  color: var(--text2);
}
header button {
  margin-left: auto;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all .15s;
}
header button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Main layout */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── 左侧: Agent 列表 ── */
#agent-panel {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#agent-panel .panel-header {
  padding: 14px 14px 8px;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text2);
  letter-spacing: .5px;
}
#agent-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}
.agent-item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background .1s;
}
.agent-item:hover { background: var(--bg3); }
.agent-item.active { background: var(--accent); color: #fff; }
.agent-item .actions { display: none; gap: 4px; }
.agent-item:hover .actions { display: flex; }
.agent-item .actions button {
  background: none; border: none; color: inherit;
  cursor: pointer; font-size: 14px; opacity: .7; padding: 0 2px;
}
.agent-item .actions button:hover { opacity: 1; }
#agent-panel .panel-footer {
  padding: 8px;
  border-top: 1px solid var(--border);
}
#agent-panel .panel-footer button {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 7px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}
#agent-panel .panel-footer button:hover { background: var(--accent); color: #fff; }

/* ── 中间: 配置表单 ── */
#form-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.section {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.form-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin-bottom: 12px;
}
.form-row:last-child { margin-bottom: 0; }
.form-row label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}
.form-row input, .form-row textarea, .form-row select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.form-row input:focus, .form-row textarea:focus, .form-row select:focus {
  border-color: var(--accent);
}
.form-row textarea {
  min-height: 120px;
  resize: vertical;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
}
.form-row input[type=range] {
  padding: 0;
  accent-color: var(--accent);
}
.form-row .range-value {
  font-size: 11px;
  color: var(--text2);
  text-align: right;
}
.checkbox-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 6px;
  max-height: 200px;
  overflow-y: auto;
}
.checkbox-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  padding: 4px 6px;
  border-radius: 4px;
  cursor: pointer;
}
.checkbox-item:hover { background: var(--bg3); }
.checkbox-item input[type=checkbox] {
  accent-color: var(--accent);
}
.inline-row {
  display: flex;
  gap: 12px;
}
.inline-row .form-row { flex: 1; }

/* ── 右侧: YAML 预览 ── */
#preview-panel {
  width: 340px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#preview-panel .panel-header {
  padding: 14px;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text2);
  letter-spacing: .5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#preview-content {
  flex: 1;
  overflow: auto;
  padding: 14px;
}
#preview-content pre {
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.6;
  white-space: pre-wrap;
  color: var(--text);
  margin: 0;
}

/* Toolbar */
footer {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
}
footer button {
  padding: 7px 18px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
  border: 1px solid var(--border);
  outline: none;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary {
  background: var(--bg3);
  color: var(--text);
}
.btn-secondary:hover { background: var(--border); }
.btn-green {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.btn-green:hover { opacity: .85; }
.btn-danger {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.btn-danger:hover { opacity: .85; }
#status-bar {
  margin-left: auto;
  font-size: 12px;
  color: var(--text2);
}

/* Toast */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 10px 20px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 9999;
  animation: toastIn .3s ease;
  max-width: 400px;
}
.toast.success { background: #1a3a1a; border: 1px solid var(--green); color: var(--green); }
.toast.error { background: #3a1a1a; border: 1px solid var(--red); color: var(--red); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Inline error */
.field-error { color: var(--red); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>

<header>
  <h1>&#9883; Harness</h1>
  <span class="subtitle">Agent 设计器</span>
  <button onclick="handleImport()" title="从 YAML/JSON 文件导入">导入</button>
</header>

<main>
  <!-- 左侧: Agent 列表 -->
  <aside id="agent-panel">
    <div class="panel-header">Agent 列表</div>
    <div id="agent-list"></div>
    <div class="panel-footer">
      <button onclick="handleNewAgent()">+ 新建 Agent</button>
    </div>
  </aside>

  <!-- 中间: 配置表单 -->
  <section id="form-panel">
    <!-- 基础信息 -->
    <div class="section">
      <div class="section-title">基础信息</div>
      <div class="form-row">
        <label>Agent 名称</label>
        <input id="f-agent-name" placeholder="my_agent" oninput="updatePreview()">
        <span class="field-error" id="err-agent-name"></span>
      </div>
      <div class="form-row">
        <label>描述</label>
        <input id="f-description" placeholder="简要描述此 Agent 的用途" oninput="updatePreview()">
      </div>
    </div>

    <!-- System Prompt -->
    <div class="section">
      <div class="section-title">系统提示词 (System Prompt)</div>
      <div class="form-row">
        <textarea id="f-system-prompt" placeholder="你是...&#10;你的职责是..." oninput="updatePreview()"></textarea>
      </div>
    </div>

    <!-- 工具选择 -->
    <div class="section">
      <div class="section-title">工具白名单</div>
      <div class="checkbox-grid" id="tools-grid">
        <span style="color:var(--text2);font-size:12px">加载中...</span>
      </div>
    </div>

    <!-- 技能选择 -->
    <div class="section">
      <div class="section-title">技能</div>
      <div class="checkbox-grid" id="skills-grid">
        <span style="color:var(--text2);font-size:12px">加载中...</span>
      </div>
    </div>

    <!-- 记忆配置 -->
    <div class="section">
      <div class="section-title">记忆配置</div>
      <div class="inline-row">
        <div class="form-row">
          <label>记忆类型</label>
          <select id="f-memory-type" onchange="updatePreview()">
            <option value="short_term">short_term — 短期记忆</option>
            <option value="long_term">long_term — 长期记忆</option>
            <option value="rag">rag — RAG 检索增强</option>
            <option value="buffered">buffered — 缓冲记忆</option>
          </select>
        </div>
        <div class="form-row">
          <label>最大 Token 数</label>
          <input id="f-memory-max-tokens" type="number" min="256" value="4096" oninput="updatePreview()">
        </div>
        <div class="form-row">
          <label>TTL (秒，0=永久)</label>
          <input id="f-memory-ttl" type="number" min="0" value="3600" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- 模型配置 -->
    <div class="section">
      <div class="section-title">模型配置</div>
      <div class="inline-row">
        <div class="form-row">
          <label>模型名称</label>
          <input id="f-model-name" placeholder="gpt-4o" value="gpt-4o" oninput="updatePreview()">
        </div>
        <div class="form-row">
          <label>Temperature: <span id="temperature-val">0.7</span></label>
          <input id="f-temperature" type="range" min="0" max="2" step="0.1" value="0.7" oninput="updateTemp(this.value)">
        </div>
        <div class="form-row">
          <label>最大输出 Token</label>
          <input id="f-max-tokens" type="number" min="128" value="8192" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- 权限 -->
    <div class="section">
      <div class="section-title">权限</div>
      <div class="form-row">
        <label>权限列表（逗号分隔）</label>
        <input id="f-permissions" placeholder="file_read, file_write, shell_exec, web_access" oninput="updatePreview()">
      </div>
    </div>
  </section>

  <!-- 右侧: YAML 预览 -->
  <aside id="preview-panel">
    <div class="panel-header">
      <span>YAML 预览</span>
      <span style="font-size:10px" id="preview-modified"></span>
    </div>
    <div id="preview-content">
      <pre id="preview-yaml"></pre>
    </div>
  </aside>
</main>

<footer>
  <button class="btn-primary" onclick="handleSave()">保存</button>
  <button class="btn-green" onclick="handleApply()">应用</button>
  <button class="btn-secondary" onclick="handleClone()">克隆</button>
  <button class="btn-secondary" onclick="handleExport()">导出 YAML</button>
  <span id="status-bar">就绪</span>
</footer>

<script>
// ═══════════════════════════════════════════
// Harness Designer — 状态管理
// ═══════════════════════════════════════════

let _agents = [];           // [agent_id, ...]
let _currentId = null;      // 当前编辑的 agent_id
let _tools = [];            // [{name, description, category}, ...]
let _skills = [];           // [{name, description}, ...]
let _dirty = false;

// ═══════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════

async function init() {
  await Promise.all([
    loadAgents(),
    loadTools(),
    loadSkills(),
  ]);
  updatePreview();
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

// ═══════════════════════════════════════════
// Agent 列表
// ═══════════════════════════════════════════

async function loadAgents() {
  try {
    const data = await api('GET', '/api/harness/agents');
    _agents = data.agents || [];
  } catch { _agents = []; }
  renderAgentList();
}

function renderAgentList() {
  const container = document.getElementById('agent-list');
  if (_agents.length === 0) {
    container.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--text2)">暂无 Agent</div>';
    return;
  }
  container.innerHTML = _agents.map(id =>
    `<div class="agent-item${id === _currentId ? ' active' : ''}" onclick="selectAgent('${escapeHtml(id)}')">
      <span>${escapeHtml(id)}</span>
      <span class="actions">
        <button title="克隆" onclick="event.stopPropagation();cloneAgent('${escapeHtml(id)}')">&#8986;</button>
        <button title="删除" onclick="event.stopPropagation();deleteAgent('${escapeHtml(id)}')">&#10005;</button>
      </span>
    </div>`
  ).join('');
}

async function selectAgent(id) {
  _currentId = id;
  _dirty = false;
  renderAgentList();
  try {
    const data = await api('GET', `/api/harness/agent/${id}`);
    if (data.error) { toast(data.error, 'error'); return; }
    fillForm(data);
  } catch(e) { toast('加载失败: ' + e, 'error'); }
  updatePreview();
}

async function handleNewAgent() {
  _currentId = null;
  _dirty = false;
  document.getElementById('f-agent-name').value = '';
  document.getElementById('f-description').value = '';
  document.getElementById('f-system-prompt').value = '';
  document.getElementById('f-memory-type').value = 'short_term';
  document.getElementById('f-memory-max-tokens').value = '4096';
  document.getElementById('f-memory-ttl').value = '3600';
  document.getElementById('f-model-name').value = 'gpt-4o';
  document.getElementById('f-temperature').value = '0.7';
  document.getElementById('f-max-tokens').value = '8192';
  document.getElementById('f-permissions').value = '';
  document.getElementById('temperature-val').textContent = '0.7';
  // 重置复选框
  document.querySelectorAll('#tools-grid input[type=checkbox], #skills-grid input[type=checkbox]').forEach(c => c.checked = false);
  renderAgentList();
  updatePreview();
  setStatus('新建 Agent');
}

async function deleteAgent(id) {
  if (!confirm(`确认删除 Agent "${id}"？此操作不可恢复。`)) return;
  try {
    const data = await api('DELETE', `/api/harness/agent/${id}`);
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`已删除 ${id}`, 'success');
    if (_currentId === id) { _currentId = null; handleNewAgent(); }
    await loadAgents();
  } catch(e) { toast('删除失败: ' + e, 'error'); }
}

async function cloneAgent(id) {
  const newName = prompt('新 Agent 名称:', id + '_clone');
  if (!newName) return;
  try {
    const data = await api('POST', `/api/harness/agent/${id}/clone`, { new_name: newName });
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`已克隆为 ${newName}`, 'success');
    await loadAgents();
  } catch(e) { toast('克隆失败: ' + e, 'error'); }
}

// ═══════════════════════════════════════════
// 工具 / 技能 列表
// ═══════════════════════════════════════════

async function loadTools() {
  try {
    const data = await api('GET', '/api/harness/tools');
    _tools = data.tools || [];
    renderCheckboxGrid('tools-grid', _tools, 'category');
  } catch(e) {
    _tools = [];
    document.getElementById('tools-grid').innerHTML = '<span style="color:var(--red);font-size:12px">加载失败</span>';
  }
}

async function loadSkills() {
  try {
    const data = await api('GET', '/api/harness/skills');
    _skills = data.skills || [];
    renderCheckboxGrid('skills-grid', _skills);
  } catch(e) {
    _skills = [];
    document.getElementById('skills-grid').innerHTML = '<span style="color:var(--red);font-size:12px">加载失败</span>';
  }
}

function renderCheckboxGrid(gridId, items, groupKey) {
  const grid = document.getElementById(gridId);
  if (!items.length) {
    grid.innerHTML = '<span style="color:var(--text2);font-size:12px">无可用项</span>';
    return;
  }
  // 按分组展示
  if (groupKey) {
    const groups = {};
    items.forEach(t => {
      const g = t[groupKey] || 'other';
      if (!groups[g]) groups[g] = [];
      groups[g].push(t);
    });
    let html = '';
    for (const [group, groupItems] of Object.entries(groups)) {
      html += `<div style="grid-column:1/-1;font-size:11px;color:var(--purple);margin-top:4px">${escapeHtml(group)}</div>`;
      groupItems.forEach(t => {
        html += `<label class="checkbox-item">
          <input type="checkbox" value="${escapeHtml(t.name)}" onchange="updatePreview()">
          <span title="${escapeHtml(t.description||'')}">${escapeHtml(t.name)}</span>
        </label>`;
      });
    }
    grid.innerHTML = html;
  } else {
    grid.innerHTML = items.map(s =>
      `<label class="checkbox-item">
        <input type="checkbox" value="${escapeHtml(s.name)}" onchange="updatePreview()">
        <span title="${escapeHtml(s.description||'')}">${escapeHtml(s.name)}</span>
      </label>`
    ).join('');
  }
}

// ═══════════════════════════════════════════
// 表单 ↔ 配置
// ═══════════════════════════════════════════

function fillForm(config) {
  document.getElementById('f-agent-name').value = config.agent_name || '';
  document.getElementById('f-description').value = config.description || '';
  document.getElementById('f-system-prompt').value = config.system_prompt || '';
  document.getElementById('f-memory-type').value = config.memory?.type || 'short_term';
  document.getElementById('f-memory-max-tokens').value = config.memory?.max_tokens ?? 4096;
  document.getElementById('f-memory-ttl').value = config.memory?.ttl ?? 3600;
  document.getElementById('f-model-name').value = config.model?.model_name || 'gpt-4o';
  document.getElementById('f-temperature').value = config.model?.temperature ?? 0.7;
  document.getElementById('f-max-tokens').value = config.model?.max_tokens ?? 8192;
  document.getElementById('f-permissions').value = (config.permissions || []).join(', ');
  document.getElementById('temperature-val').textContent = config.model?.temperature ?? '0.7';

  // 设置复选框
  document.querySelectorAll('#tools-grid input[type=checkbox], #skills-grid input[type=checkbox]').forEach(c => c.checked = false);
  (config.tools || []).forEach(t => {
    const cb = document.querySelector(`#tools-grid input[value="${t}"]`);
    if (cb) cb.checked = true;
  });
  (config.skills || []).forEach(s => {
    const cb = document.querySelector(`#skills-grid input[value="${s}"]`);
    if (cb) cb.checked = true;
  });
}

function getFormConfig() {
  const tools = [];
  document.querySelectorAll('#tools-grid input[type=checkbox]:checked').forEach(c => tools.push(c.value));
  const skills = [];
  document.querySelectorAll('#skills-grid input[type=checkbox]:checked').forEach(c => skills.push(c.value));

  const perms = document.getElementById('f-permissions').value.split(',').map(s => s.trim()).filter(Boolean);

  return {
    agent_name: document.getElementById('f-agent-name').value.trim(),
    description: document.getElementById('f-description').value.trim(),
    system_prompt: document.getElementById('f-system-prompt').value,
    tools: tools,
    skills: skills,
    memory: {
      type: document.getElementById('f-memory-type').value,
      max_tokens: parseInt(document.getElementById('f-memory-max-tokens').value) || 4096,
      ttl: parseInt(document.getElementById('f-memory-ttl').value) || 0,
    },
    model: {
      model_name: document.getElementById('f-model-name').value.trim(),
      temperature: parseFloat(document.getElementById('f-temperature').value) || 0.7,
      max_tokens: parseInt(document.getElementById('f-max-tokens').value) || 8192,
    },
    permissions: perms,
    triggers: [],
  };
}

function updateTemp(val) {
  document.getElementById('temperature-val').textContent = parseFloat(val).toFixed(1);
  updatePreview();
}

// ═══════════════════════════════════════════
// YAML 预览
// ═══════════════════════════════════════════

function updatePreview() {
  _dirty = true;
  const config = getFormConfig();
  const yaml = configToYaml(config);
  document.getElementById('preview-yaml').textContent = yaml;
  document.getElementById('preview-modified').textContent = _currentId ? `已修改` : '新建（未保存）';
}

function configToYaml(config) {
  const lines = [];
  lines.push(`agent_name: ${config.agent_name || '<未填写>'}`);
  lines.push(`description: "${config.description}"`);
  lines.push(`system_prompt: |`);
  (config.system_prompt || '  <未填写>').split('\n').forEach(l => lines.push(`  ${l}`));
  lines.push(`tools:`);
  if (config.tools.length) config.tools.forEach(t => lines.push(`  - ${t}`));
  else lines.push('  []');
  lines.push(`skills:`);
  if (config.skills.length) config.skills.forEach(s => lines.push(`  - ${s}`));
  else lines.push('  []');
  lines.push(`memory:`);
  lines.push(`  type: ${config.memory.type}`);
  lines.push(`  max_tokens: ${config.memory.max_tokens}`);
  lines.push(`  ttl: ${config.memory.ttl}`);
  lines.push(`model:`);
  lines.push(`  model_name: ${config.model.model_name}`);
  lines.push(`  temperature: ${config.model.temperature}`);
  lines.push(`  max_tokens: ${config.model.max_tokens}`);
  lines.push(`permissions:`);
  if (config.permissions.length) config.permissions.forEach(p => lines.push(`  - ${p}`));
  else lines.push('  []');
  return lines.join('\n');
}

// ═══════════════════════════════════════════
// 操作按钮
// ═══════════════════════════════════════════

async function handleSave() {
  const config = getFormConfig();
  if (!config.agent_name) { toast('请填写 Agent 名称', 'error'); return; }
  _currentId = config.agent_name;
  try {
    const data = await api('PUT', `/api/harness/agent/${config.agent_name}`, config);
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`已保存: ${config.agent_name}`, 'success');
    _dirty = false;
    await loadAgents();
    updatePreview();
  } catch(e) { toast('保存失败: ' + e, 'error'); }
}

async function handleApply() {
  const config = getFormConfig();
  if (!config.agent_name) { toast('请先填写 Agent 名称并保存', 'error'); return; }
  if (_dirty) {
    if (!confirm('配置已修改但未保存。是否先保存再应用？')) return;
    await handleSave();
  }
  try {
    const data = await api('PUT', `/api/harness/agent/${config.agent_name}/apply`, config);
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`已应用: ${config.agent_name}`, 'success');
    setStatus(`已应用 ${config.agent_name}`);
  } catch(e) { toast('应用失败: ' + e, 'error'); }
}

async function handleClone() {
  const config = getFormConfig();
  if (!config.agent_name) { toast('请先填写 Agent 名称', 'error'); return; }
  const newName = prompt('新 Agent 名称:', config.agent_name + '_clone');
  if (!newName) return;
  try {
    const data = await api('POST', `/api/harness/agent/${config.agent_name}/clone`, { new_name: newName });
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`已克隆为 ${newName}`, 'success');
    await loadAgents();
    selectAgent(newName);
  } catch(e) { toast('克隆失败: ' + e, 'error'); }
}

function handleExport() {
  const config = getFormConfig();
  const yaml = configToYaml(config);
  const blob = new Blob([yaml], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (config.agent_name || 'agent') + '.yaml';
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出 YAML', 'success');
}

function handleImport() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.yaml,.yml,.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    let config;
    try {
      if (file.name.endsWith('.json')) {
        config = JSON.parse(text);
      } else {
        // 简单 YAML 解析（仅处理顶层字段）
        config = simpleYamlParse(text);
      }
      fillForm(config);
      _currentId = config.agent_name || null;
      _dirty = false;
      updatePreview();
      await loadAgents();
      toast(`已导入: ${config.agent_name || '未命名'}`, 'success');
    } catch(e) { toast('解析失败: ' + e, 'error'); }
  };
  input.click();
}

// 简易 YAML 解析（仅处理 Agent 配置所需的字段）
function simpleYamlParse(text) {
  const config = {
    agent_name: '', description: '', system_prompt: '',
    tools: [], skills: [], permissions: [], triggers: [],
    memory: { type: 'short_term', max_tokens: 4096, ttl: 3600 },
    model: { model_name: 'gpt-4o', temperature: 0.7, max_tokens: 8192 },
  };
  const lines = text.split('\n');
  let inPrompt = false, promptLines = [];
  let inSection = null;
  for (let line of lines) {
    const trimmed = line.trimEnd();
    if (inPrompt) {
      if (trimmed.match(/^[a-z_]+\s*:/)) { inPrompt = false; /* fall through */ }
      else { promptLines.push(trimmed.replace(/^  /, '')); continue; }
    }
    const m = trimmed.match(/^([a-z_]+)\s*:\s*(.*)$/);
    if (!m) continue;
    const key = m[1], val = m[2].replace(/^["']|["']$/g, '');
    switch (key) {
      case 'agent_name': config.agent_name = val; break;
      case 'description': config.description = val; break;
      case 'system_prompt':
        if (val === '|' || val === '|-' || val === '>') { inPrompt = true; promptLines = []; }
        else config.system_prompt = val;
        break;
      case 'tools': inSection = 'tools'; break;
      case 'skills': inSection = 'skills'; break;
      case 'permissions': inSection = 'permissions'; break;
      default:
        if (inSection && trimmed.match(/^\s*-\s+(.*)/)) {
          const item = trimmed.match(/^\s*-\s+(.*)/)[1];
          if (inSection === 'tools') config.tools.push(item);
          else if (inSection === 'skills') config.skills.push(item);
          else if (inSection === 'permissions') config.permissions.push(item);
        } else { inSection = null; }
        break;
    }
    // sub keys
    const sm = trimmed.match(/^\s+([a-z_]+)\s*:\s*(.*)$/);
    if (sm) {
      const sk = sm[1], sv = sm[2].replace(/^["']|["']$/g, '');
      if (sk === 'type' && val) config.memory.type = sv;
      else if (sk === 'max_tokens') { const v = parseInt(sv); if (!isNaN(v)) { if (/^\s{4}/.test(line)) config.model.max_tokens = v; else config.memory.max_tokens = v; } }
      else if (sk === 'ttl') { const v = parseInt(sv); if (!isNaN(v)) config.memory.ttl = v; }
      else if (sk === 'model_name') config.model.model_name = sv;
      else if (sk === 'temperature') { const v = parseFloat(sv); if (!isNaN(v)) config.model.temperature = v; }
    }
  }
  if (inPrompt && promptLines.length) config.system_prompt = promptLines.join('\n');
  return config;
}

// ═══════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// 启动
init();
</script>
